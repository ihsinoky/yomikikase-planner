name: TAKT Runner

on:
  issue_comment:
    types: [created]

jobs:
  takt:
    if: ${{ !github.event.issue.pull_request && contains(github.event.comment.body, '@takt') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run TAKT
        uses: nrslib/takt-action@v1
        with:
          provider: codex
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          piece: default
