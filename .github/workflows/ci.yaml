name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 必要なら env をここで設定（例: DB_URL など）
      # - name: Set up environment
      #   run: echo "DB_URL=postgres://..." >> $GITHUB_ENV

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      # Next.js やビルドがある場合
      - name: Build
        run: npm run build

  deploy-production:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Vercel secrets
        run: |
          test -n "$VERCEL_TOKEN" || (echo 'VERCEL_TOKEN is not set' && exit 1)
          test -n "$VERCEL_ORG_ID" || (echo 'VERCEL_ORG_ID is not set' && exit 1)
          test -n "$VERCEL_PROJECT_ID" || (echo 'VERCEL_PROJECT_ID is not set' && exit 1)

      - name: Pull Vercel environment settings
        run: npx vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Run Prisma migrations
        if: env.DATABASE_URL != ''
        run: npx prisma migrate deploy

      - name: Build Vercel artifacts
        run: npx vercel@latest build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel production
        run: npx vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN"
