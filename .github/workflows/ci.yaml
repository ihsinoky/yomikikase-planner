name: Verify Static Stack

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  verify-sprint1-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make verification script executable
        run: chmod +x scripts/verify-sprint1.sh

      - name: Verify Cloudflare/GAS/LIFF assets
        run: ./scripts/verify-sprint1.sh
