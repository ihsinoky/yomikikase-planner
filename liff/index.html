<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>読み聞かせプランナー</title>
  <style>
    :root {
      --bg-top: #fff6df;
      --bg-bottom: #f2f8ff;
      --surface: rgba(255, 255, 255, 0.9);
      --surface-strong: #ffffff;
      --border: rgba(15, 23, 42, 0.08);
      --text-main: #1f2937;
      --text-sub: #526071;
      --accent: #d85b2f;
      --accent-deep: #9f3d1d;
      --accent-soft: rgba(216, 91, 47, 0.12);
      --ok-bg: #ecfdf3;
      --ok-text: #166534;
      --error-bg: #fef2f2;
      --error-text: #b91c1c;
      --warn-bg: #fffbeb;
      --warn-text: #b45309;
      --shadow: 0 18px 50px rgba(31, 41, 55, 0.12);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Noto Sans JP", "Yu Gothic", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at top left, rgba(216, 91, 47, 0.18), transparent 32%),
        radial-gradient(circle at right 20%, rgba(63, 131, 248, 0.14), transparent 28%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      padding: 24px 16px 48px;
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .hero,
    .card {
      background: var(--surface);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 28px 24px;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -40px -60px auto;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(216, 91, 47, 0.18), transparent 70%);
      transform: rotate(12deg);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-deep);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    h1 {
      margin: 18px 0 10px;
      font-size: clamp(30px, 7vw, 42px);
      line-height: 1.1;
    }

    .hero p {
      margin: 0;
      color: var(--text-sub);
      font-size: 15px;
      line-height: 1.8;
      max-width: 44rem;
    }

    .card {
      padding: 22px;
    }

    .card h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .status {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 16px 18px;
      border-radius: var(--radius-lg);
      border: 1px solid transparent;
      transition: all 180ms ease;
    }

    .status.loading {
      background: var(--warn-bg);
      color: var(--warn-text);
      border-color: rgba(180, 83, 9, 0.14);
    }

    .status.success {
      background: var(--ok-bg);
      color: var(--ok-text);
      border-color: rgba(22, 101, 52, 0.16);
    }

    .status.error {
      background: var(--error-bg);
      color: var(--error-text);
      border-color: rgba(185, 28, 28, 0.14);
    }

    .split {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .metric {
      padding: 16px;
      border-radius: var(--radius-md);
      background: var(--surface-strong);
      border: 1px solid var(--border);
    }

    .metric .label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-sub);
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .metric .value {
      font-size: 15px;
      word-break: break-word;
    }

    form {
      display: grid;
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      font-size: 14px;
      font-weight: 700;
    }

    input,
    select,
    textarea,
    button {
      font: inherit;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid rgba(31, 41, 55, 0.12);
      border-radius: 14px;
      padding: 14px 15px;
      background: #fff;
      color: var(--text-main);
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: rgba(216, 91, 47, 0.6);
      box-shadow: 0 0 0 4px rgba(216, 91, 47, 0.14);
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, opacity 140ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(31, 41, 55, 0.1);
    }

    button:disabled {
      opacity: 0.56;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .primary-button {
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #ef7b42);
    }

    .survey-intro {
      margin-bottom: 18px;
      color: var(--text-sub);
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .date-list {
      display: grid;
      gap: 14px;
      margin-bottom: 20px;
    }

    .date-card {
      padding: 18px;
      background: var(--surface-strong);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      transform-origin: center top;
      animation: rise 320ms ease both;
    }

    .date-card h3 {
      margin: 0 0 6px;
      font-size: 18px;
    }

    .date-meta {
      margin: 0 0 14px;
      color: var(--text-sub);
      font-size: 14px;
    }

    .answer-group {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .answer-option {
      position: relative;
    }

    .answer-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .answer-option span {
      display: block;
      padding: 13px 10px;
      border-radius: 14px;
      text-align: center;
      border: 1px solid rgba(31, 41, 55, 0.1);
      background: #fff;
      font-weight: 700;
    }

    .answer-option input:checked + span {
      border-color: rgba(216, 91, 47, 0.7);
      background: rgba(216, 91, 47, 0.08);
      color: var(--accent-deep);
      box-shadow: inset 0 0 0 1px rgba(216, 91, 47, 0.12);
    }

    .helper {
      margin: 8px 0 0;
      color: var(--text-sub);
      font-size: 13px;
    }

    .hidden {
      display: none;
    }

    .log-list {
      max-height: 220px;
      overflow: auto;
      display: grid;
      gap: 8px;
      padding-right: 4px;
    }

    .log-item {
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(31, 41, 55, 0.08);
      font-size: 13px;
      line-height: 1.6;
    }

    .footer-note {
      color: var(--text-sub);
      font-size: 13px;
      text-align: center;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 720px) {
      .split,
      .answer-group {
        grid-template-columns: 1fr;
      }

      .hero,
      .card {
        border-radius: 22px;
      }
    }
  </style>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="eyebrow">Milestone 3 MVP</div>
      <h1>読み聞かせアンケート</h1>
      <p>LINE でログインした保護者が、最新アンケートの候補日に対して参加可否を回答できる画面です。初回アクセス時はプロフィール登録が必要です。</p>
    </section>

    <section class="card">
      <div id="status" class="status loading">初期化しています...</div>
    </section>

    <section id="profileCard" class="card hidden">
      <h2>利用者情報</h2>
      <div class="split">
        <div class="metric">
          <span class="label">LINE 表示名</span>
          <span id="displayNameValue" class="value"></span>
        </div>
        <div class="metric">
          <span class="label">LINE User ID</span>
          <span id="lineUserIdValue" class="value"></span>
        </div>
      </div>
      <p id="profileSummary" class="helper"></p>
    </section>

    <section id="registrationCard" class="card hidden">
      <h2>初回プロフィール登録</h2>
      <form id="registrationForm">
        <div class="field">
          <label for="childName">お子さまのお名前</label>
          <input id="childName" name="childName" type="text" autocomplete="name" required>
        </div>
        <div class="split">
          <div class="field">
            <label for="grade">学年</label>
            <select id="grade" name="grade" required>
              <option value="">選択してください</option>
              <option value="年少">年少</option>
              <option value="年中">年中</option>
              <option value="年長">年長</option>
            </select>
          </div>
          <div class="field">
            <label for="class">クラス</label>
            <input id="class" name="class" type="text" placeholder="例: さくら組" required>
          </div>
        </div>
        <button id="registrationSubmit" class="primary-button" type="submit">プロフィールを保存</button>
      </form>
    </section>

    <section id="surveyCard" class="card hidden">
      <h2 id="surveyTitle">最新アンケート</h2>
      <p id="surveyDescription" class="survey-intro"></p>
      <form id="surveyForm">
        <div id="dateList" class="date-list"></div>
        <button id="surveySubmit" class="primary-button" type="submit">回答を送信</button>
      </form>
    </section>

    <section class="card">
      <h2>実行ログ</h2>
      <div id="logList" class="log-list"></div>
    </section>

    <p class="footer-note">API は Cloudflare Functions 経由で Google Apps Script に中継されます。</p>
  </main>

  <script>
    const state = {
      config: null,
      liffId: '',
      idToken: '',
      profile: null,
      user: null,
      survey: null,
      dates: []
    };

    function appendLog(message) {
      const logList = document.getElementById('logList');
      const item = document.createElement('div');
      const timestamp = new Date().toLocaleTimeString('ja-JP', { hour12: false });
      item.className = 'log-item';
      item.textContent = '[' + timestamp + '] ' + message;
      logList.prepend(item);
    }

    function updateStatus(message, type) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = 'status ' + type;
      appendLog(message);
    }

    function showSection(id, visible) {
      document.getElementById(id).classList.toggle('hidden', !visible);
    }

    function getLiffIdFromUrl() {
      return new URLSearchParams(window.location.search).get('liffId') || '';
    }

    async function fetchConfig() {
      const response = await fetch('/api/config');
      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || '設定の取得に失敗しました');
      }

      return data;
    }

    async function apiRequest(path, options) {
      const requestOptions = Object.assign({ method: 'GET' }, options || {});
      const headers = Object.assign({}, requestOptions.headers || {});

      if (requestOptions.body && !headers['Content-Type']) {
        headers['Content-Type'] = 'application/json';
      }

      if (state.idToken) {
        headers.Authorization = 'Bearer ' + state.idToken;
      }

      requestOptions.headers = headers;

      const response = await fetch(path, requestOptions);
      const data = await response.json();

      if (!response.ok || data.ok === false) {
        throw new Error(data.error || data.message || 'API request failed');
      }

      return data;
    }

    async function initializeLiff() {
      state.config = await fetchConfig();
      state.liffId = getLiffIdFromUrl() || state.config.liffId || '';

      if (!state.liffId) {
        throw new Error('LIFF_ID が未設定です');
      }

      updateStatus('LIFF を初期化しています...', 'loading');
      await liff.init({
        liffId: state.liffId,
        withLoginOnExternalBrowser: true
      });

      if (!liff.isLoggedIn()) {
        updateStatus('LINE ログインに移動します...', 'loading');
        liff.login();
        return false;
      }

      state.idToken = liff.getIDToken() || '';

      if (!state.idToken) {
        throw new Error('ID トークンを取得できませんでした。LIFF の openid scope を確認してください');
      }

      state.profile = await liff.getProfile();
      return true;
    }

    function renderProfile() {
      document.getElementById('displayNameValue').textContent = state.profile.displayName || '(未設定)';
      document.getElementById('lineUserIdValue').textContent = state.profile.userId;

      if (state.user) {
        document.getElementById('profileSummary').textContent =
          state.user.childName + ' / ' + state.user.grade + ' / ' + state.user.class;
      } else {
        document.getElementById('profileSummary').textContent = '初回登録が必要です。';
      }

      showSection('profileCard', true);
    }

    async function loadCurrentUser() {
      const result = await apiRequest('/api/users');
      state.user = result.user;
    }

    async function registerCurrentUser(formData) {
      const payload = {
        childName: formData.get('childName'),
        grade: formData.get('grade'),
        class: formData.get('class')
      };
      const result = await apiRequest('/api/users', {
        method: 'POST',
        body: JSON.stringify(payload)
      });

      state.user = result.user;
      renderProfile();
      showSection('registrationCard', false);
      updateStatus('プロフィールを保存しました。アンケートを読み込みます...', 'success');
    }

    async function loadSurvey() {
      const result = await apiRequest('/api/gas/surveys', { method: 'GET' });
      state.survey = result.survey;
      state.dates = result.dates || [];
    }

    function renderSurvey() {
      const surveyCard = document.getElementById('surveyCard');
      const dateList = document.getElementById('dateList');

      document.getElementById('surveyTitle').textContent = state.survey.title;
      document.getElementById('surveyDescription').textContent = state.survey.description || '参加可能な候補日を選択してください。';
      dateList.innerHTML = '';

      if (!state.dates.length) {
        const empty = document.createElement('p');
        empty.className = 'helper';
        empty.textContent = '現在、表示できる候補日がありません。';
        dateList.appendChild(empty);
      }

      state.dates.forEach(function(date, index) {
        const article = document.createElement('article');
        article.className = 'date-card';
        article.style.animationDelay = String(index * 60) + 'ms';

        const title = document.createElement('h3');
        title.textContent = date.label || formatDateLabel(date.dateTime, date.targetGrade);
        article.appendChild(title);

        const meta = document.createElement('p');
        meta.className = 'date-meta';
        meta.textContent = [date.targetGrade, toDisplayDate(date.dateTime)].filter(Boolean).join(' / ');
        article.appendChild(meta);

        const answerGroup = document.createElement('div');
        answerGroup.className = 'answer-group';

        ['可', '不可', '未定'].forEach(function(answer) {
          const label = document.createElement('label');
          label.className = 'answer-option';

          const input = document.createElement('input');
          input.type = 'radio';
          input.name = 'answer-' + date.surveyDateId;
          input.value = answer;
          input.required = true;

          const text = document.createElement('span');
          text.textContent = answer;

          label.appendChild(input);
          label.appendChild(text);
          answerGroup.appendChild(label);
        });

        article.appendChild(answerGroup);
        dateList.appendChild(article);
      });

      surveyCard.classList.remove('hidden');
    }

    function toDisplayDate(dateTime) {
      if (!dateTime) {
        return '';
      }

      const date = new Date(dateTime);

      if (Number.isNaN(date.getTime())) {
        return dateTime;
      }

      return date.toLocaleString('ja-JP', {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        weekday: 'short',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function formatDateLabel(dateTime, targetGrade) {
      return [toDisplayDate(dateTime), targetGrade].filter(Boolean).join(' / ');
    }

    async function submitResponses() {
      const form = document.getElementById('surveyForm');
      const submitButton = document.getElementById('surveySubmit');
      const formData = new FormData(form);
      let index;

      for (index = 0; index < state.dates.length; index += 1) {
        if (!formData.get('answer-' + state.dates[index].surveyDateId)) {
          throw new Error('すべての候補日に回答してください');
        }
      }

      submitButton.disabled = true;

      try {
        for (index = 0; index < state.dates.length; index += 1) {
          await apiRequest('/api/gas/responses', {
            method: 'POST',
            body: JSON.stringify({
              surveyId: state.survey.surveyId,
              surveyDateId: state.dates[index].surveyDateId,
              answer: formData.get('answer-' + state.dates[index].surveyDateId),
              notes: ''
            })
          });
        }

        updateStatus('回答を保存しました。ありがとうございました。', 'success');
      } finally {
        submitButton.disabled = false;
      }
    }

    async function setupApplication() {
      updateStatus('設定を確認しています...', 'loading');

      const initialized = await initializeLiff();

      if (!initialized) {
        return;
      }

      updateStatus('プロフィールを確認しています...', 'loading');
      await loadCurrentUser();
      renderProfile();

      if (!state.user) {
        showSection('registrationCard', true);
        updateStatus('初回プロフィール登録を入力してください', 'loading');
        return;
      }

      updateStatus('最新アンケートを読み込んでいます...', 'loading');
      await loadSurvey();
      renderSurvey();
      updateStatus('アンケートを回答してください', 'success');
    }

    document.addEventListener('DOMContentLoaded', function() {
      const registrationForm = document.getElementById('registrationForm');
      const surveyForm = document.getElementById('surveyForm');

      registrationForm.addEventListener('submit', async function(event) {
        event.preventDefault();
        const submitButton = document.getElementById('registrationSubmit');
        submitButton.disabled = true;

        try {
          await registerCurrentUser(new FormData(registrationForm));
          await loadSurvey();
          renderSurvey();
          updateStatus('アンケートを回答してください', 'success');
        } catch (error) {
          updateStatus(error.message, 'error');
        } finally {
          submitButton.disabled = false;
        }
      });

      surveyForm.addEventListener('submit', async function(event) {
        event.preventDefault();

        try {
          updateStatus('回答を保存しています...', 'loading');
          await submitResponses();
        } catch (error) {
          updateStatus(error.message, 'error');
        }
      });

      if (typeof liff === 'undefined') {
        updateStatus('LIFF SDK を読み込めませんでした', 'error');
        return;
      }

      setupApplication().catch(function(error) {
        updateStatus(error.message, 'error');
      });
    });
  </script>
</body>
</html>
